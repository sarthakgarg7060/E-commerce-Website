<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaCart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero-shell">
    <nav class="navbar">
      <div class="logo">NovaCart</div>
      <div class="nav-actions">
        <button class="login-btn" id="logoutBtn" type="button">Logout</button>
        <button class="cart-btn" type="button" aria-label="Shopping cart">
          <span class="cart-icon">&#128722;</span>
          <span class="cart-count">0</span>
        </button>
      </div>
    </nav>

    <section class="hero">
      <div class="hero-copy hero-animated">
        <p class="eyebrow">Fresh arrivals for everyday living</p>
        <h1>Simple shopping, thoughtfully designed.</h1>
        <p class="hero-text">
          Browse a clean collection of modern essentials with a smooth, beginner-friendly frontend setup.
        </p>
      </div>
    </section>
  </header>

  <main class="page-content">
    <section class="products-section">
      <div class="section-heading">
        <p class="section-label">Featured products</p>
        <h2>Top picks for your next upgrade</h2>
      </div>

      <div class="product-grid" id="productGrid"></div>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
